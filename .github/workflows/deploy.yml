name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]  # আপনার ব্রাঞ্চের নাম দিন

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Replace token placeholder
        run: |
          sed -i "s/{{ GH_TOKEN }}/${{ secrets.GH_TOKEN }}/g" index.html
        # ধরে নিচ্ছি আপনার HTML ফাইলের নাম index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
