name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]          # আপনার ডিফল্ট ব্রাঞ্চ (main বা master)

concurrency:
  group: "pages"
  cancel-in-progress: false      # চলমান ডেপ্লয়মেন্ট বাতিল না করে অপেক্ষা করবে

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Replace token placeholder
        run: sed -i 's|{{ GH_TOKEN }}|${{ secrets.GH_TOKEN }}|g' index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
