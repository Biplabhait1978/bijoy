name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]   # আপনার ব্রাঞ্চ নাম দিন (main বা master)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Replace token placeholder
        run: |
          # আপনার HTML ফাইলের নাম এখানে দিন (যেমন bijoy.html)
          sed -i 's|{{ GH_TOKEN }}|${{ secrets.GH_TOKEN }}|g' bijoy.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
